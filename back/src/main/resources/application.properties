# Server Configuration
server.port=8080
spring.application.name=omnicare-backend

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5433/omnicaredb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled for PostgreSQL)
spring.h2.console.enabled=false

# JWT Configuration
jwt.secret=omnicare-secret-key-change-this-in-production-to-a-very-long-secure-random-string
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.omnicare=INFO
logging.level.org.springframework.security=INFO
